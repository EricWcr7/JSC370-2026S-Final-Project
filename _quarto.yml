project:
  type: website
  output-dir: docs
  render:
    - "index.qmd"
    - "report.qmd"
    - "viz.qmd"

website:
  title: "JSC370 Final Project"
  navbar:
    pinned: true
    background: light
    foreground: dark
    left:
      - text: "Home"
        href: index.qmd
      - text: "Report"
        href: report.qmd
      - text: "Interactive Viz"
        href: viz.qmd
    right:
      - icon: github
        href: https://github.com/EricWcr7/JSC370-2026S-Final-Project
        target: _blank
        aria-label: "GitHub repository"
  page-footer:
    border: false
    left: |
      JSC370 2026S · Yi Fan (Eric) Wang · University of Toronto
    center: |
      [Download PDF](report.pdf) · [GitHub](https://github.com/EricWcr7/JSC370-2026S-Final-Project)
    right: |
      April 26, 2026

format:
  html:
    theme:
      - cosmo
      - theme.scss
    css: styles.css
    toc: true
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
